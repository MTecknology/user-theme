<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>User-Respecting Theme</title>

  <style>

    /* THEME: Light */
    :root {
      --bg: #0D0C0A;
      --card: #E1DCCB;
      --text: #000000;
      --gold: #51400B;
      --gold-glow: rgba(218, 165, 32, 0.2);

      --transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* THEME: Dark */
    body.dark-theme {
      --bg: #2A261A;
      --card: #15130F;
      --text: #E2D1A4;
      --gold: #C39A1D;
      --gold-glow: rgba(139, 109, 21, 0.1);
    }

    /* Other Theme Stuff */
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      transition: background-color var(--transition), color var(--transition);
    }
    main {
      position: relative;
      background-color: var(--card);
      padding: 3rem;
      max-width: 400px;
      text-align: center;
      border: 3px solid var(--gold);
      border-radius: 1px;
      box-shadow: 0 0 20px var(--gold-glow);
      transition: all var(--transition);
    }
    main::before {
      /* Decorative corner */
      content: '';
      position: absolute;
      top: -5px; left: -5px;
      width: 15px; height: 15px;
      border-radius: 2px;
      border-top: 3px solid var(--gold);
      border-left: 3px solid var(--gold);
    }
    h1 {
      text-transform: uppercase;
      letter-spacing: 5px;
      color: var(--text);
      transition: all var(--transition);
    }
    p {
      line-height: 1.6;
      opacity: 0.8;
      font-size: 1rem;
      transition: all var(--transition);
    }
    a {
      color: var(--gold);
    }
    button {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--text);
      padding: 0.75rem 2rem;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }
    button:hover {
      background: var(--gold);
      color: var(--card);
      box-shadow: 0 0 15px var(--gold);
      transition: all 0.3s ease;
    }
    #debug {
      position: fixed;
      top: 0.5rem;
      left: 0.5rem;
      color:white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="debug">Your Browser Prefers: Uknown</div>

  <main>
    <!-- Main content -->
    <h1>Welcome, Human.</h1>
    <p>Browsers support user preference and you can too!</p>
    <p>Check out <a href="https://github.com/MTecknology/user-theme/blob/main/index.html#L11-L29">the source code</a> for yourself!</p>
    <button id="toggle">Change Theme</button>
  </main>

  <script>
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      // Set dark theme if preferred by browser/user
      document.body.classList.add('dark-theme');

      preference = 'Dark'
    } else {
      preference = 'Light'
    }

    // Set debug text to preferred theme
    document.getElementById('debug').textContent = 'Your Browser Prefers: ' + preference + ' Themes';

    // Toggle theme when button is clicked
    document.getElementById('toggle').addEventListener('click', () => {
      document.body.classList.toggle('dark-theme');
    });
  </script>

</body>
</html>
